spring.application.name=BAKEBITE API
spring.datasource.url=jdbc:postgresql://db.odamimtcvbrlxgrybqyw.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Sanjay_2003*
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool - reuse connections instead of creating new ones each time
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.pool-name=BakeBiteHikariPool

# 'none' skips schema validation/alteration - safest for Supabase hosted DBs
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Speed up entity loading
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

